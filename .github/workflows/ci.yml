name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        # Tests that need the license-restricted corpus / oracle binaries skip
        # automatically when those are absent (they aren't in CI).
        run: python -m pytest -q

  rust:
    name: Rust (test + clippy + wasm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (default + wasm)
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo clippy --features wasm --target wasm32-unknown-unknown -- -D warnings
      - name: Test
        run: cargo test
      - name: Build wasm
        run: cargo build --release --features wasm --target wasm32-unknown-unknown
